# Lovelace: ApexCharts Card — Tages-Leistung (PV, Netz o. Wallbox, Batterie, 2× Wallbox)
#
# Voraussetzungen:
# 1. HACS → "ApexCharts Card" installieren, Dashboard neu laden.
# 2. Template-Sensor `sensor.grid_net_excl_wallboxes` aus ENERGY_DASHBOARD_ENTITIES.md anlegen
#    (net_consumption_rounded − Carport − Garage; Wallbox = 0 wenn unavailable; kW-Wallbox → ×1000).
# 3. Wenn „Batterie laden“ keine Fläche zeigt: In HA → Verlauf prüfen, ob beim Laden Werte > 0
#    kommen. Manche Geräte liefern Ladeleistung negativ — dann `invert: true` bei der Serie setzen.
# 4. Reihenfolge: PV → Netz → Batterie → Wallboxen; **Wallbox zuletzt** (zeichnet obenauf).
# 5. Netz: In HA oft **positiv = Netzbezug**, **negativ = Einspeisung**. YAML nutzt `transform` mit **`Number.isFinite`** → **−n** für die Darstellung (Ein + / Bez −); ungültige Punkte → **null** (kein **NaN**).
#    Passt das nicht zu deinem Sensor: `transform`-Zeile entfernen. Y-Achse **`min: auto`**, damit negativ sichtbar bleibt.
# 6. Wallboxen: oft **kW** (Zahl 0…11). **Nicht** eine zweite Y-Achse nutzen: Der Nullpunkt von kW liegt
#    dann auf derselben Bildhöhe wie das Watt-Minimum — eine Linie bei 0 kW sieht aus wie z. B. -5500 W.
#    Stattdessen: **eine W-Achse**, `transform` **×1000** (kW → W). Sensoren schon in **W**? `transform` ohne `* 1000` (nur `Number.isFinite`-Zweig), siehe YAML.
# 7. Lädt die Karte endlos (Spinner): oft **NaN** aus `transform` bei fehlendem State oder
#    **fehlende Entity** (`grid_net_excl_wallboxes`). Transforms liefern nur **endliche** Zahlen oder **null**.
#    Zusätzlich: `update_interval` / `update_delay` — Browser F12 → Konsole. Mini-Test: eine Serie `sensor.sun` o. ä.
# 8. Senkrechter Absturz der **Netz**-Kurve zur Linie „Jetzt“ / bis ans Y-Minimum: **`extend_to: now`** bei Netz
#    streckt künstlich bis zur aktuellen Uhr — oft zusammen mit `group_by` fehlerhaft. Netz-Serie hat **`extend_to: false`**.

type: custom:apexcharts-card
header:
  show: true
  title: Leistung heute (W)
  show_states: false
# Kalendertag 00:00–24:00 (laut ApexCharts-Doku: start XOR end, nicht beides)
graph_span: 24h
span:
  start: day
update_interval: 1min
update_delay: 3s
show:
  last_updated: false
now:
  show: true
  label: Jetzt
apex_config:
  chart:
    height: 380
    stacked: false
    zoom:
      enabled: true
    toolbar:
      show: true
  stroke:
    width: 2
  legend:
    show: true
    position: bottom
  grid:
    padding:
      bottom: 16
  dataLabels:
    enabled: false
yaxis:
  - id: w
    min: auto
    apex_config:
      title:
        text: W
    decimals: 0

series:
  - entity: sensor.total_dc_power
    name: PV (DC)
    color: '#2d7dd2'
    type: area
    curve: smooth
    opacity: 0.45
    stroke_width: 2
    yaxis_id: w
    unit: W
    extend_to: now
    fill_raw: last
    group_by:
      duration: 5min
      func: max

  - entity: sensor.grid_net_excl_wallboxes
    name: Netz o. WB (Ein + / Bez −)
    color: '#e07020'
    type: area
    curve: smooth
    opacity: 0.4
    stroke_width: 2
    yaxis_id: w
    unit: W
    transform: 'const n = Number(x); return Number.isFinite(n) ? -n : null;'
    extend_to: false
    fill_raw: last
    group_by:
      duration: 5min
      func: avg

  # Batterie vor Wallboxen: letzte Fläche obenauf; Wallbox-Linien danach (besser sichtbar).
  - entity: sensor.battery_charging_power
    name: Batterie laden
    color: '#7b4397'
    type: area
    curve: smooth
    opacity: 0.55
    stroke_width: 2
    yaxis_id: w
    unit: W
    extend_to: now
    fill_raw: last
    group_by:
      duration: 5min
      func: max

  - entity: sensor.carport_power
    name: Wallbox Carport
    color: '#e8c547'
    type: area
    curve: stepline
    opacity: 0.5
    stroke_width: 1
    yaxis_id: w
    unit: W
    transform: 'const n = Number(x); return Number.isFinite(n) ? n * 1000 : null;'
    extend_to: now
    fill_raw: last
    group_by:
      duration: 5min
      func: max

  - entity: sensor.garage_power
    name: Wallbox Garage
    color: '#f0e68c'
    type: area
    curve: stepline
    opacity: 0.55
    stroke_width: 1
    yaxis_id: w
    unit: W
    transform: 'const n = Number(x); return Number.isFinite(n) ? n * 1000 : null;'
    extend_to: now
    fill_raw: last
    group_by:
      duration: 5min
      func: max
